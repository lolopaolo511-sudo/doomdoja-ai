profile:
  name: "Piero Nocentini"
  title: "AI Automation & Web Scraping Expert"
  hourly_rate_min: 35
  hourly_rate_max: 120
  preferred_budget_min: 500
  skills:
    - "web scraping"
    - "python automation"
    - "AI agent"
    - "data extraction"
    - "LLM"
    - "FastAPI"
    - "playwright"
    - "airtable"
    - "n8n"
    - "document processing"
    - "OCR"
    - "lead generation"
  avoid_keywords:
    - "wordpress only"
    - "react native"
    - "mobile app"
  strong_match_keywords:
