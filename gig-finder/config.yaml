profile:
  name: "Piero Nocentini"
  title: "AI Automation & Web Scraping Expert"
  hourly_rate_min: 35
  hourly_rate_max: 120
  preferred_budget_min: 300
  skills:
    - web scraping
    - data extraction
    - python automation
    - ETL pipeline
    - AI agent
    - LLM
    - playwright
    - selenium
    - airtable
    - make.com
    - zapier
    - n8n
    - pandas
    - lead generation
    - OCR
    - invoice parsing
    - document processing
    - FastAPI
    - crawler

  strong_match_keywords:
    - scraping
    - crawler
    - data extraction
    - automation
    - web scraper
    - airtable
    - make.com
    - zapier
    - n8n
    - lead gen
    - lead generation
    - invoice
    - OCR
    - pdf extraction
    - data pipeline
    - ETL
    - playwright

  avoid_keywords:
    - wordpress only
    - react native
    - mobile app
    - iOS
    - Android
    - Shopify theme
    - blockchain
    - smart contract
    - crypto

filters:
  # Domeny całkowicie zablokowane — etatowe agregatory i LinkedIn
  blocked_domains:
    - linkedin.com
    - cataloxy.pl
    - pracuj.pl
    - rocketjobs.pl
    - goldenline.pl
    - nofluffjobs.com
    - justjoin.it
    - indeed.com
    - glassdoor.com
    - monster.com
    - careerbuilder.com
    - ziprecruiter.com
    - theladders.com
  # Odrzucaj ogłoszenia starsze niż N dni (null = brak filtru)
  max_age_days: 7

sources:
  remoteok:
    enabled: true
    tags:
      - python
      - automation
      - data
    max_jobs: 50

  weworkremotely:
    enabled: true
    categories:
      - programming
    max_jobs: 30

  hn_hiring:
    enabled: true
    keywords:
      - scraping
      - automation
      - python
      - data pipeline
    max_comments: 100

  upwork_rss:
    enabled: false           # wymaga UPWORK_RSS_URL w .env
    # Jak podpiąć:
    # 1. Zaloguj się na Upwork
    # 2. Wyszukaj ogłoszenia (np. "python scraping automation")
    # 3. Zapisz wyniki jako Saved Search
    # 4. Otwórz DevTools → Network, odśwież stronę z ogłoszeniami
    # 5. Znajdź request do /ab/feed/jobs/rss i skopiuj URL
    # 6. Wpisz URL do .env jako UPWORK_RSS_URL=https://www.upwork.com/ab/feed/jobs/rss?...
    # 7. Ustaw enabled: true tutaj
    max_jobs: 30

  searxng:
    enabled: true
    url: "http://localhost:8888"
    queries:
      - "python web scraping freelance contract"
      - "data extraction automation freelancer hire"
      - "airtable automation developer contract"
      - "make.com zapier n8n automation project"
      - "lead generation scraping python remote"
    max_per_query: 5

  reddit_forhire:
    enabled: true
    max_posts: 50

  remotive:
    enabled: true
    categories:
      - software-dev
      - data
    search: "python scraping automation"
    max_jobs: 30

  freelancer:
    enabled: true            # próbuje bez auth; z FREELANCER_OAUTH_TOKEN w .env pełny dostęp
    max_jobs: 20

scoring:
  use_llm: true
  model: "deepseek-coder-v2:16b"
  ollama_url: "http://localhost:11434"
  fit_threshold: 6
  llm_timeout: 45

report:
  top_n: 15
  output_dir: "reports"
  formats:
    - markdown
    - html

delivery:
  webhook_enabled: false
  dry_run_if_no_url: true
