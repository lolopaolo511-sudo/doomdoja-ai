name: Freight Copilot CI

on:
  push:
    paths:
      - "freight-copilot/**"
      - ".github/workflows/freight-copilot-ci.yml"
  pull_request:
    paths:
      - "freight-copilot/**"

concurrency:
  group: freight-copilot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freight-copilot/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: freight-copilot/backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Tests (pytest)
        env:
          DEMO_MODE: "true"
          LLM_PROVIDER: "mock"
        run: python -m pytest -q
