name: iOS Build

on:
  push:
    branches:
      - "claude/file-instructions-execution-g55wh0"
      - "codex/**"
    paths:
      - "DoomDoja-iOS/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    paths:
      - "DoomDoja-iOS/**"
      - ".github/workflows/ios-ci.yml"

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project DoomDoja-iOS/DoomDoja.xcodeproj \
            -scheme DoomDoja \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build
