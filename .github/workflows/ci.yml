# ─────────────────────────────────────────────────────────────────────────────
# CI pipeline — doomdoja-ai
#
# Tryby:
#   eval-lite (domyślny, GitHub-hosted runner):
#     - Brak Ollamy — mock responses, testuje logikę scoringu
#     - Zawsze działa w GitHub Actions bez dodatkowej konfiguracji
#
#   eval-real (self-hosted runner z Ollama):
#     - Potrzeba self-hosted runnera z labelką [self-hosted, ollama]
#     - Jak podłączyć:
#         1. Na Mac Mini: Settings → Actions → Runners → Add runner
#         2. Pobierz i uruchom runner wg instrukcji GitHub
#         3. Ustaw labels: self-hosted, ollama, macos
#         4. Ollama musi być dostępna na localhost:11434
#         5. W repozytorium: Settings → Secrets → OLLAMA_RUNNER=true
#         6. Zmień runs-on poniżej na: [self-hosted, ollama, macos]
#
# Bramka pass-rate:
#   eval-lite:  próg 70% (zawsze spełniany przez mock)
#   eval-real:  próg 70% (realne modele muszą go utrzymać)
#   Jeśli pass-rate < 70% → ci/eval-gate kończy się exit code 1 → PR zablokowany
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

# Anuluj poprzednie uruchomienia tego samego PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  EVAL_PASS_THRESHOLD: "70"

jobs:
  # ── 1. Unit tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip -r requirements-ci.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        working-directory: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: .pytest_cache/

  # ── 2. Eval-lite (mock, bez Ollamy — zawsze na GitHub-hosted) ───────────────
  eval-gate:
    name: Eval Gate (lite)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip -r requirements-ci.txt

      - name: Run eval-lite
        id: eval_lite
        env:
          EVAL_PASS_THRESHOLD: ${{ env.EVAL_PASS_THRESHOLD }}
        run: |
          python3 evals/eval_lite.py --threshold ${{ env.EVAL_PASS_THRESHOLD }}
        working-directory: ${{ github.workspace }}
        # Exit code 1 jeśli pass-rate < threshold → job fail → PR zablokowany

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-lite-report
          path: evals/reports/eval_lite_*.json

  # ── 3. Eval-real (opcjonalny, self-hosted + Ollama) ──────────────────────────
  #
