  # ── 4. Status summary ────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, eval-gate]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "eval-gate:  ${{ needs.eval-gate.result }}"
          if [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.eval-gate.result }}" != "success" ]]; then
            echo "CI FAILED"
            exit 1
          fi
          echo "CI PASSED"
