name: lead-generation
description: B2B Lead Generation & Intelligent Follow-up pipeline

models:
  planner: deepseek-coder-v2:16b
  coder: deepseek-coder-v2:16b
  reviewer: deepseek-coder-v2:16b

tools:
  - playwright_scrape
  - airtable_write
  - make_webhook
  - search_web

paths:
  tools_dir: ~/qwen-agent/tools/
  workspace: ~/qwen-agent/multiagent/workspace/lead-generation/

integrations:
  airtable:
    tables: [Leads, FollowUps]
  make:
    webhook_env: MAKE_WEBHOOK_URL
  telegram:
    optional: true

prompts:
  system: system.md
  planner: planner.md
  coder: coder.md
  reviewer: reviewer.md
