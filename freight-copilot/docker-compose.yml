# Optional Postgres-backed stack. The default local demo uses SQLite and does
# NOT require Docker (`make demo`). Use this when you want Postgres parity.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
      POSTGRES_DB: freight_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://freight:freight@db:5432/freight_copilot
      DEMO_MODE: "true"
      EXTERNAL_WRITES_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
