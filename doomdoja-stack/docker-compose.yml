services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    # healthcheck: qdrant image has no curl/wget; service is fine without it

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=${TZ:-Europe/Warsaw}
      - TZ=${TZ:-Europe/Warsaw}
    volumes:
      - ./data/n8n:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-doomdoja-local-only-not-public}
    volumes:
      - ./data/searxng:/etc/searxng:rw

volumes: {}
